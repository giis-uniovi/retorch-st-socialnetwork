  unique-id-service:
    build:
      context: ./sut
      dockerfile: Dockerfile
    image: social-network-microservices:socialnetwork
    container_name: ${TJOB_NAME}-unique-id-service
    hostname: unique-id-service
    restart: always
    depends_on:
      - jaeger-agent
    entrypoint: UniqueIdService
    volumes:
      - ./sut/config:/social-network-microservices/config
    networks:
      - jenkins_network

  user-mention-service:
    build:
      context: ./sut
      dockerfile: Dockerfile
    image: social-network-microservices:socialnetwork
    container_name: ${TJOB_NAME}-user-mention-service
    hostname: user-mention-service
    depends_on:
      - jaeger-agent
    restart: always
    entrypoint: UserMentionService
    volumes:
      - ./sut/config:/social-network-microservices/config
    networks:
      - jenkins_network

  home-timeline-service:
    build:
      context: ./sut
      dockerfile: Dockerfile
    image: social-network-microservices:socialnetwork
    container_name: ${TJOB_NAME}-home-timeline-service
    hostname: home-timeline-service
    depends_on:
      - jaeger-agent
    restart: always
    entrypoint: HomeTimelineService
    volumes:
      - ./sut/config:/social-network-microservices/config
    networks:
      - jenkins_network

  write-home-timeline-service:
    build:
      context: ./sut
      dockerfile: Dockerfile
    image: social-network-microservices:socialnetwork
    container_name: ${TJOB_NAME}-write-home-timeline-service
    hostname: write-home-timeline-service
    depends_on:
      - jaeger-agent
      - write-home-timeline-rabbitmq
    restart: always
    entrypoint: WriteHomeTimelineService
    volumes:
      - ./sut/config:/social-network-microservices/config
    networks:
      - jenkins_network

  write-home-timeline-rabbitmq:
    build:
      context: ./sut/docker/rabbitmq
    image: rabbitmq:socialnetwork
    container_name: ${TJOB_NAME}-write-home-timeline-rabbitmq
    hostname: write-home-timeline-rabbitmq
    restart: always
    networks:
      - jenkins_network

  nginx-thrift:
    build:
      context: ./sut/docker/openresty-thrift
      dockerfile: xenial/Dockerfile
      network: host
    image: openresty-thrift:socialnetwork
    container_name: ${TJOB_NAME}-nginx-thrift
    hostname: nginx-thrift
    ports:
      - ${frontend_port}:8080
    depends_on:
      - jaeger-agent
    restart: always
    volumes:
      - ./sut/nginx-web-server/lua-scripts:/usr/local/openresty/nginx/lua-scripts
      - ./sut/nginx-web-server/pages:/usr/local/openresty/nginx/pages
      - ./sut/nginx-web-server/conf/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
      - ./sut/nginx-web-server/jaeger-config.json:/usr/local/openresty/nginx/jaeger-config.json
      - ./sut/gen-lua:/gen-lua
      - ./sut/docker/openresty-thrift/lua-thrift:/usr/local/openresty/lualib/thrift
    networks:
      - jenkins_network

  jaeger-agent:
    build:
      context: ./sut/docker/jaeger
    image: jaeger-agent:socialnetwork
    container_name: ${TJOB_NAME}-jaeger-agent
    hostname: jaeger-agent
    restart: always
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
    networks:
      - jenkins_network

networks:
  jenkins_network:
    external: true
