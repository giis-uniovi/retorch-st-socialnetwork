services:

  social-graph-service:
    build:
      context: ./sut
      dockerfile: Dockerfile
    image: social-network-microservices:socialnetwork
    container_name: ${TJOB_NAME}-social-graph-service
    hostname: social-graph-service
    depends_on:
      - jaeger-agent
      - social-graph-mongodb
    restart: always
    entrypoint: SocialGraphService
    volumes:
      - ./sut/config:/social-network-microservices/config
    networks:
      - jenkins_network

  social-graph-mongodb:
    image: mongo:4.4.6
    container_name: ${TJOB_NAME}-social-graph-mongodb
    hostname: social-graph-mongodb
    restart: always
    networks:
      - jenkins_network

  social-graph-redis:
    build:
      context: ./sut/docker/redis
    image: redis:socialnetwork
    container_name: ${TJOB_NAME}-social-graph-redis
    hostname: social-graph-redis
    restart: always
    networks:
      - jenkins_network

  home-timeline-redis:
    build:
