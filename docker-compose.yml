  media-memcached:
    build:
      context: ./sut/docker/memcached
    image: memcached:socialnetwork
    container_name: ${TJOB_NAME}-media-memcached
    hostname: media-memcached
    restart: always
    networks:
      - jenkins_network

  media-mongodb:
    image: mongo:4.4.6
    container_name: ${TJOB_NAME}-media-mongodb
    hostname: media-mongodb
    restart: always
    networks:
      - jenkins_network

  text-service:
    build:
      context: ./sut
      dockerfile: Dockerfile
    image: social-network-microservices:socialnetwork
    container_name: ${TJOB_NAME}-text-service
    hostname: text-service
    restart: always
    depends_on:
      - jaeger-agent
    entrypoint: TextService
    volumes:
      - ./sut/config:/social-network-microservices/config
    networks:
