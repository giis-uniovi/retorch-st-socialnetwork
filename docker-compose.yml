  user-memcached:
    build:
      context: ./sut/docker/memcached
    image: memcached:socialnetwork
    container_name: ${TJOB_NAME}-user-memcached
    hostname: user-memcached
    restart: always
    networks:
      - jenkins_network

  user-mongodb:
    image: mongo:4.4.6
    container_name: ${TJOB_NAME}-user-mongodb
    hostname: user-mongodb
