<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Contact</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
        integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous" />
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"
        integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous" />
    <link rel="stylesheet" href="style/main.css" />
    <script src="https://code.jquery.com/jquery-3.4.1.js"></script>
</head>

<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>

    <script type="text/javascript" src="./javascript/utils.js"></script>
    <script type="text/javascript" src="./javascript/timeline.js"></script>
    <script src="./javascript/navbar.js"></script>
    <div class="container-fluid" id="navbar-container"></div>
    <script>renderNavbar("main.html"); showUsername();</script>

    <div class="container-fluid gedf-wrapper">
        <div class="row">
            <div class="col-md-9 gedf-main">

                <div>
                    <h2>Follow a User</h2>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <form action="api/user/follow" id="follow-form" method="POST"
                            enctype="application/x-www-form-urlencoded">
                            <div class="form-group mb-3">
                                <input type="text" class="form-control mb-2" id="followee-name" name="followee_name"
                                    placeholder="type a user name to follow" aria-label="User name to follow">
                                <input type="text" class="hide follow-username" id="user-name" name="user_name"
                                    aria-label="Your user name">
                                <input type="submit" class="btn btn-md btn-primary" value="Follow">
                            </div>
                        </form>
                    </div>
                </div>

                <div>
                    <h2>Unfollow a User</h2>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <form action="api/user/unfollow" id="unfollow-form" method="POST"
                            enctype="application/x-www-form-urlencoded">
                            <div class="form-group mb-3">
                                <input type="text" class="form-control mb-2" id="unfollow-followee-name" name="followee_name"
                                    placeholder="type a user name to unfollow" aria-label="User name to unfollow">
                                <input type="text" class="hide follow-username" id="unfollow-user-name" name="user_name"
                                    aria-label="Your user name">
                                <input type="submit" class="btn btn-md btn-primary" value="Unfollow">
                            </div>
                        </form>
                    </div>
                </div>

                <div>
                    <div>
                        <h2>Follower List:</h2>
                    </div>

                    <div id="follower-list">
                        <div class="follower-div card gedf-card post-card">
                            <div class="row no-gutters">
                                <div class="col-md-12">
                                    <div class="card-header">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div class="ml-2">
                                                    <div class="h5 m-0 follower-id">Follower ID</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div>
                        <h2>Following:</h2>
                    </div>
                    <div id="followee-list">
                        <div class="followee-div card gedf-card post-card">
                            <div class="row no-gutters">
                                <div class="col-md-12">
                                    <div class="card-header">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div class="ml-2">
                                                    <div class="h5 m-0 followee-id">Followee ID</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </div>
    </div>
    <script src="./javascript/get-follower.js"></script>
    <script src="./javascript/get-followee.js"></script>
    <script src="./javascript/contact.js"></script>
    <script type="text/javascript" src="./javascript/button-click.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>

</html>
